name: Evidence Age Alerts

on:
  schedule:
    - cron: '23 1 * * 2,5'  # Monday and Thursday ~6pm Pacific (Tue/Fri 01:23 UTC)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for stale evidence
        id: staleness
        run: |
          node -e "
          const fs = require('fs');
          const evidence = JSON.parse(fs.readFileSync('docs/api/v1/evidence.json', 'utf8'));
          const threshold = 30;
          const now = Date.now();
          const stale = evidence.evidence
            .filter(e => e.verified)
            .map(e => ({
              id: e.entity_id,
              verified: e.verified,
              days: Math.floor((now - new Date(e.verified).getTime()) / 86400000)
            }))
            .filter(e => e.days > threshold)
            .sort((a, b) => b.days - a.days);

          if (stale.length === 0) {
            console.log('No stale records found.');
            fs.writeFileSync(process.env.GITHUB_OUTPUT, 'has_stale=false\n', { flag: 'a' });
            process.exit(0);
          }

          const rows = stale.map(s => '| ' + s.id + ' | ' + s.verified + ' | ' + s.days + ' days |').join('\n');
          const body = '## Stale evidence report\n\n' +
            stale.length + ' evidence records have not been verified in over ' + threshold + ' days.\n\n' +
            '| Implementation | Last Verified | Age |\n|---|---|---|\n' + rows + '\n\n' +
            'Run \`node scripts/verify-features.js --stale-only\` to re-verify these records.\n\n' +
            '_Generated by evidence-alerts workflow_';

          fs.writeFileSync(process.env.GITHUB_OUTPUT, 'has_stale=true\n', { flag: 'a' });
          fs.writeFileSync('staleness-body.md', body);
          console.log(stale.length + ' stale records found.');
          "

      - name: Create or update issue
        if: steps.staleness.outputs.has_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Stale evidence: records older than 30 days"
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file staleness-body.md
          else
            gh issue create --title "$TITLE" --body-file staleness-body.md --label "staleness"
          fi
