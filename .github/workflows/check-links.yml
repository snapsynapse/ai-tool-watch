name: Check Links

on:
  # Weekly schedule - Wednesdays at 00:00 UTC (midweek from feature verification)
  schedule:
    - cron: '0 0 * * 3'

  # Manual trigger
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to check (leave empty for all)'
        required: false
        type: string

jobs:
  check-links:
    name: Validate URLs
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build check arguments
        id: args
        run: |
          ARGS="--verbose"
          if [ -n "${{ inputs.platform }}" ]; then
            ARGS="$ARGS --platform ${{ inputs.platform }}"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run link checker
        id: check
        run: |
          node scripts/check-links.js ${{ steps.args.outputs.args }}
        continue-on-error: true

      - name: Upload link report
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: .link-reports/
          retention-days: 30

      - name: Create issue for broken links
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest report
          REPORT=$(ls -t .link-reports/*.md | head -1)

          # Extract broken links section
          BROKEN=$(sed -n '/## ❌ Broken Links/,/## /p' "$REPORT" | head -n -1)

          if [ -n "$BROKEN" ]; then
            # Skip if an open broken-links issue already exists
            EXISTING=$(gh issue list --state open --label "broken-links" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$EXISTING" ]; then
              echo "Open broken-links issue already exists (#$EXISTING), skipping creation"
              exit 0
            fi

            # Create labels if they don't exist (ignore errors)
            gh label create "broken-links" --color "d73a4a" --description "Broken URL detected" 2>/dev/null || true
            gh label create "needs-review" --color "fbca04" --description "Needs manual review" 2>/dev/null || true

            gh issue create \
              --title "[Automated] Broken links detected" \
              --body "The weekly link check found broken URLs in the feature data.

          $BROKEN

          ## Action Required

          1. Verify each broken link manually
          2. Update or remove invalid URLs
          3. Submit a PR with fixes

          ---
          *This issue was automatically created by the link checker.*" \
              --label "broken-links,needs-review"
          fi
